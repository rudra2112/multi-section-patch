name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    name: Native ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux/amd64
            runner: ubuntu-24.04
            binary: ./skills/multi-section-patch/scripts/multi-section-patch-linux-amd64
          - target: linux/arm64
            runner: ubuntu-24.04-arm
            binary: ./skills/multi-section-patch/scripts/multi-section-patch-linux-arm64
          - target: darwin/amd64
            runner: macos-15-intel
            binary: ./skills/multi-section-patch/scripts/multi-section-patch-darwin-amd64
          - target: darwin/arm64
            runner: macos-15
            binary: ./skills/multi-section-patch/scripts/multi-section-patch-darwin-arm64
          - target: windows/amd64
            runner: windows-2025
            binary: ./skills/multi-section-patch/scripts/multi-section-patch-windows-amd64.exe
          - target: windows/arm64
            runner: windows-11-arm
            binary: ./skills/multi-section-patch/scripts/multi-section-patch-windows-arm64.exe
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.1'
          cache: false
      - name: Verify native runner
        env:
          EXPECTED_TARGET: ${{ matrix.target }}
        run: test "$(go env GOOS)/$(go env GOARCH)" = "$EXPECTED_TARGET"
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build native executable
        env:
          TARGETS: ${{ matrix.target }}
        run: ./scripts/build-artifacts.sh
      - name: Smoke-test native executable
        env:
          MULTI_SECTION_PATCH_BINARY: ${{ matrix.binary }}
        run: |
          mkdir .multi-section-patch-smoke
          printf 'alpha\nbeta\n' > .multi-section-patch-smoke/input.txt
          "$MULTI_SECTION_PATCH_BINARY" read --json '.multi-section-patch-smoke/input.txt@2:2' > .multi-section-patch-smoke/output.json
          grep -F '"content": "beta\n"' .multi-section-patch-smoke/output.json

  reproducibility:
    name: Reproducible binaries
    needs: native
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.1'
          cache: false
      - name: Build all targets twice
        run: |
          first="${RUNNER_TEMP}/multi-section-patch-build-one"
          second="${RUNNER_TEMP}/multi-section-patch-build-two"
          OUTPUT_ROOT="$first" ./scripts/build-artifacts.sh
          OUTPUT_ROOT="$second" ./scripts/build-artifacts.sh
          diff skills/multi-section-patch/SHA256SUMS "$first/SHA256SUMS"
          diff "$first/SHA256SUMS" "$second/SHA256SUMS"
          while read -r _ file; do
            cmp "skills/multi-section-patch/${file}" "$first/${file}"
            cmp "$first/${file}" "$second/${file}"
          done < skills/multi-section-patch/SHA256SUMS
      - name: Verify checksums
        run: (cd skills/multi-section-patch && sha256sum --check SHA256SUMS)
